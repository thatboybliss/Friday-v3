services:
  # 1. Frontend (Static Site)
  - type: web
    name: friday-frontend
    env: static
    buildCommand: pnpm install && pnpm build
    publishPath: ./dist
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html

  # 2. Backend (Web Service)
  - type: web
    name: friday-api
    env: node
    plan: standard
    buildCommand: pnpm install && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: friday-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: friday-cache
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

# 3. Databases
databases:
  - name: friday-db
    plan: standard

# 4. Redis Cache
redis:
  - name: friday-cache
    plan: free
    ipAllowList: []
